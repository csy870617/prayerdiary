<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6b73c4" />
  <title>기도수첩</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%99%8F%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 로딩 -->
  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
  </div>

  <!-- 로그인 화면 -->
  <section id="login-view" class="login-view" hidden>
    <div class="login-card">
      <div class="login-emoji">🙏</div>
      <h1 class="login-title">기도수첩</h1>
      <p class="login-desc">기도제목을 적고, 응답되면 체크하고,<br />언제든 다시 펼쳐보세요.</p>
      <button id="google-signin" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 시작하기
      </button>
      <p id="login-error" class="login-error" hidden></p>
    </div>
    <footer class="login-foot">데이터는 본인 계정에만 안전하게 저장됩니다.</footer>
  </section>

  <!-- 메인 앱 -->
  <section id="app-view" class="app-view" hidden>
    <header class="app-header">
      <div class="brand">
        <span class="brand-emoji">🙏</span>
        <span class="brand-name">기도수첩</span>
      </div>
      <div class="user-box">
        <img id="user-photo" class="user-photo" alt="" referrerpolicy="no-referrer" />
        <span id="user-name" class="user-name"></span>
        <button id="signout" class="signout-btn" title="로그아웃">로그아웃</button>
      </div>
    </header>

    <main class="app-main">
      <!-- 입력 -->
      <form id="add-form" class="add-form" autocomplete="off">
        <input
          id="title-input"
          class="title-input"
          type="text"
          placeholder="기도제목을 입력하세요"
          maxlength="200"
          required
        />
        <div class="add-row">
          <input
            id="category-input"
            class="category-input"
            type="text"
            list="category-list"
            placeholder="카테고리 (예: 가족)"
            maxlength="20"
          />
          <datalist id="category-list"></datalist>
          <button type="submit" class="add-btn">추가</button>
        </div>
      </form>

      <!-- 필터 -->
      <div class="filters">
        <div class="filter-tabs" id="status-tabs">
          <button class="tab active" data-status="all">전체 <span class="count" data-count="all">0</span></button>
          <button class="tab" data-status="active">기도중 <span class="count" data-count="active">0</span></button>
          <button class="tab" data-status="answered">응답됨 <span class="count" data-count="answered">0</span></button>
        </div>
        <div class="category-chips" id="category-chips"></div>
      </div>

      <!-- 목록 -->
      <div id="prayer-list" class="prayer-list"></div>
      <div id="empty-state" class="empty-state" hidden>
        <div class="empty-emoji">🕊️</div>
        <p class="empty-text">아직 기도제목이 없어요.<br />첫 기도제목을 적어보세요.</p>
      </div>
    </main>
  </section>

  <!-- Firebase 미설정 안내 -->
  <div id="config-warning" class="config-warning" hidden>
    <div class="config-card">
      <h2>⚙️ Firebase 설정이 필요합니다</h2>
      <p><code>config.js</code> 파일에 Firebase 웹 설정값을 넣어주세요.
      자세한 방법은 <code>README.md</code>를 확인하세요.</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
